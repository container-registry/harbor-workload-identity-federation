{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "credential-provider-harbor.serviceAccountName" . }}
  namespace: {{ include "credential-provider-harbor.namespace" . }}
  labels:
    {{- include "credential-provider-harbor.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
