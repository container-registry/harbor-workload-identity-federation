{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "credential-provider-harbor.fullname" . }}
  labels:
    {{- include "credential-provider-harbor.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "credential-provider-harbor.fullname" . }}
  labels:
    {{- include "credential-provider-harbor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "credential-provider-harbor.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "credential-provider-harbor.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
